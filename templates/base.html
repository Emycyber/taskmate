{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <!-- Google Font: Poppins -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        /*
                    Poppins: modern, clean font that elevates the whole app
                    applied globally so all pages benefit
                */
      }

      .navbar {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        /*
                    custom shadow: gives the navbar depth and separates
                    it from page content below
                */
      }

      .nav-link {
        font-weight: 500;
        font-size: 0.95rem;
        padding: 0.5rem 1rem !important;
        border-radius: 8px;
        transition:
          background 0.2s ease,
          color 0.2s ease;
        /*
                    font-weight 500: slightly bold for readability
                    border-radius: rounded hover background
                    transition: smooth hover animation
                */
      }

      .nav-link:hover {
        background-color: rgba(13, 110, 253, 0.08);
        color: #0d6efd !important;
        /*
                    subtle blue tint on hover
                    matches Bootstrap primary color
                */
      }

      .nav-link.active {
        background-color: rgba(13, 110, 253, 0.12);
        color: #0d6efd !important;
        font-weight: 600;
        /*
                    active link gets a stronger blue tint
                    and bolder font to show current page
                */
      }

      .navbar-brand-text {
        font-size: 1.3rem;
        font-weight: 700;
        color: #1a1a2e !important;
        letter-spacing: -0.5px;
        /*
                    large bold brand name
                    tight letter spacing for a modern logo feel
                */
      }

      .navbar-brand-text span {
        color: #0d6efd;
        /*
                    highlights "mate" in blue to create a two-tone logo effect
                */
      }

      .username-badge {
        background-color: rgba(13, 110, 253, 0.1);
        color: #0d6efd;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        /*
                    pill-shaped username display
                    subtle blue background matching brand color
                */
      }
    </style>

    {% block title %} {% endblock title %}
  </head>

  <body style="background: #f8f9fa">
    <!--
            nav moved here into body where it belongs
            was incorrectly placed inside <head> before
        -->

    <nav class="navbar navbar-expand-lg bg-white sticky-top">
      <!--
                bg-white: clean white navbar instead of grey
                sticky-top: navbar stays visible as user scrolls
                navbar-expand-lg: collapses into hamburger on mobile
            -->
      <div class="container">
        <!--
                    container: constrains navbar width on large screens
                    matches the container width of your page content
                -->

        <!-- Brand -->
        <a class="navbar-brand navbar-brand-text" href="{% url 'index' %}">
          <!--
                        navbar-brand: Bootstrap brand/logo component
                        navbar-brand-text: our custom class for styling
                    -->
          Task<span>mate</span>
          <!--
                        two-tone text logo: "Task" in dark, "mate" in blue
                        no image needed - text logos scale perfectly on all screens
                    -->
        </a>

        <!-- Hamburger Toggler -->
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation">
          <!--
                        border-0: removes the default border around hamburger
                        for a cleaner mobile look
                    -->
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Content -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <!--
                        collapse: hidden on mobile until hamburger is clicked
                        navbar-collapse: Bootstrap collapse behavior
                    -->

          <!-- Center Nav Links -->
          <ul class="navbar-nav mx-auto gap-1">
            <!--
                            navbar-nav: Bootstrap nav list
                            mx-auto: pushes nav links to the center
                            gap-1: small space between each nav link
                        -->
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}"
                href="{% url 'index' %}">
                🏠 Home
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'todolist' %}active{% endif %}"
                href="{% url 'todolist' %}">
                ✅ Todo List
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
                href="{% url 'contact' %}">
                📬 Contact Us
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
                href="{% url 'about' %}">
                💡 About Us
              </a>
            </li>
          </ul>

          <!-- Right Side Auth Controls -->
          <div class="d-flex align-items-center gap-2 mt-3 mt-lg-0">
            <!--
                            d-flex: flexbox for horizontal alignment
                            align-items-center: vertically centers items
                            gap-2: space between username and button
                            mt-3 mt-lg-0: top margin on mobile, none on desktop
                        -->
            {% if user.is_authenticated %}
            <form
              action="{% url 'logout' %}"
              method="post"
              class="d-flex align-items-center gap-2">
              {% csrf_token %}
              <span class="username-badge">👤 {{ user.username }}</span>
              <!--
                                    username-badge: custom pill style defined above
                                    shows logged in user's name clearly
                                -->
              <button type="submit" class="btn btn-danger btn-sm px-3">
                <!--
                                        btn-danger: red logout button
                                        btn-sm: compact size
                                        px-3: horizontal padding
                                    -->
                Logout
              </button>
            </form>
            {% else %}
            <a
              href="{% url 'login' %}"
              class="btn btn-outline-primary btn-sm px-3">
              <!--
                                    btn-outline-primary: outlined blue button for login
                                    less visual weight than register (secondary action)
                                -->
              Log In
            </a>
            <a href="{% url 'register' %}" class="btn btn-primary btn-sm px-3">
              <!--
                                    btn-primary: solid blue for register (primary action)
                                    visually stronger to encourage sign ups
                                -->
              Register
            </a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    {% block content %} {% endblock content %}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
