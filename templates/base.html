{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
              crossorigin="anonymous" />
        {% block title %}
        {% endblock title %}



        <nav class="navbar navbar-expand-lg bg-body-secondary">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'index' %}">
            <img src="{% static 'images/Bet9ja.png' %}"
                 alt="Taskmate logo"
                 height="40" />
        </a>

        <!-- Hamburger toggler -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible content -->
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

            <!-- Menu links (centered) -->
            <div class="navbar-nav mx-auto">
                <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">Home</a>
                <a class="nav-link {% if request.resolver_match.url_name == 'todolist' %}active{% endif %}" href="{% url 'todolist' %}">Todo List</a>
                <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'contact' %}">Contact Us</a>
                <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'about' %}">About Us</a>
            </div>

            <!-- Right side: Auth controls -->
            <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0">
                {% if user.is_authenticated %}
                    <!-- Logout form -->
                    <form action="{% url 'logout' %}" method="post" class="d-flex align-items-center gap-3">
                        {% csrf_token %}
                        <span class="fw-bold text-muted">{{ user.username }}</span>
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <!-- Login / Register buttons -->
                    <div class="d-flex gap-2">
                        <a href="{% url 'login' %}" class="btn btn-outline-success btn-sm">
                            Log In
                        </a>
                        <a href="{% url 'register' %}" class="btn btn-outline-success btn-sm">
                            Register
                        </a>
                    </div>
                {% endif %}
            </div>

        </div>
    </div>
</nav>
    </head>
    <body class="bg-tertiary">
        {% block content %}
        {% endblock content %}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
    </body>
</html>
