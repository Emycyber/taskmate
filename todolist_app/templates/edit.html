{% extends "base.html" %}
{% block title %}
    <title>Edit Task - Taskmate</title>
{% endblock title %}
{% block content %}
    <div class="container">
    </br>

    {% if task_obj.manage == request.user %}
    <form method="POST" class="row">
        {% csrf_token %}
        <div>
            <label class="col-lg-4 mb-2">Your Task for Today?</label>
            <input type="text"
                   class="form-control col-lg-4"
                   name="task"
                   placeholder="{{ task_obj.task }}"
                   value="{{ task_obj.task }}">

            <input type="hidden"
                   name="done"
                   placeholder="{{ task_obj.done }}">


            <button type="submit" class="btn btn-primary col-lg-2 mt-2">Update Task</button>
        </div>
    </form>
    {% else %}
        <p>Access Restricted. You are not Allowed!</p>
    {% endif %}
</div>
{% endblock content %}
